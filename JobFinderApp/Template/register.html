<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - Job Portal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
 <link href="css/bootstrap.min.css" rel="stylesheet">
  <!-- Favicon -->
    <link href="img/favicon.png" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Inter:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Icon Font Stylesheet -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="reg">
<div class="container mt-5 mb-5">
<div class="row justify-content-center">
<div class="col-md-8">

<div class="card reg-card p-4">
<h3 class="text-center">Create Your Account</h3>
<p class="text-center text-muted">Register as Candidate or Recruiter</p>

<form>

<!-- BASIC DETAILS -->
<h5 class="mt-3">Basic Details</h5>
<div class="row">
<div class="col-md-6 mb-3">
<label>Full Name</label>
<input type="text" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" class="form-control">
</div>
</div>

<div class="row">
<div class="col-md-6 mb-3">
<label>Mobile Number</label>
<input type="text" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Register As</label>
<select class="form-control" id="roleSelect" onchange="showFields()">
<option value="">Select Role</option>
<option value="candidate">Candidate</option>
<option value="recruiter">Recruiter</option>
</select>
</div>
</div>

<!-- PASSWORD CREATION -->
<h5>Password Creation</h5>
<div class="row">
<div class="col-md-6 mb-3">
<label>Create Password</label>
<input type="password" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Confirm Password</label>
<input type="password" class="form-control">
</div>
</div>

<!-- CANDIDATE SECTION -->
<div id="candidateFields" class="hidden">
<hr>
<h5>Candidate Details</h5>

<div class="mb-3">
<label>Skills</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label>Experience</label>
<input type="number" class="form-control">
</div>

<div class="mb-3">
<label>Upload Resume</label>
<input type="file" class="form-control">
</div>

</div>

<!-- RECRUITER SECTION -->
<div id="recruiterFields" class="hidden">
<hr>
<h5>Company Details</h5>

<div class="mb-3">
<label>Company Name</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label>Company Website</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label>Company Location</label>
<input type="text" class="form-control">
</div>

</div>

<button class="btn btn-success w-100 mt-3">Create Account</button>

<p class="text-center mt-3">
Already have account? <a href="login.html">Login</a>
</p>

</form>
</div>

</div>
</div>
</div>
</div>

<script>
function showFields(){
    var role = document.getElementById("roleSelect").value;
    var candidate = document.getElementById("candidateFields");
    var recruiter = document.getElementById("recruiterFields");

    candidate.style.display = "none";
    recruiter.style.display = "none";

    if(role === "candidate"){
        candidate.style.display = "block";
    }
    else if(role === "recruiter"){
        recruiter.style.display = "block";
    }
}
</script>

</body>
</html>
